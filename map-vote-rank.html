}

function getRank(keyToFind, obj) {
  // On transforme l'objet en tableau de [clé, pourcentage]
  const arr = Object.entries(obj).map(([key, value]) => {
    const match = value.match(/([\d.,]+)\s*%/);
    const percent = match ? parseFloat(match[1].replace(',', '.')) : 0;
    return [key, percent];
  });

  // On trie par pourcentage décroissant
  arr.sort((a, b) => b[1] - a[1]);

  // On trouve la position (1 = premier)
  const index = arr.findIndex(([key, _]) => key === keyToFind);
  return index === -1 ? null : index + 1;
}


// conversion vers GeoJSON
const geoData = {
  type: "FeatureCollection",
  features: bureauxRaw.results.map(bv => {

    const num = bv.num_bv.padStart(2, '0');
    const key = "Bureau " + bv.arrondissement + num;

    const data = dataAbst[key] ? dataAbst[key].data : "";

    const rank = getRank("Le Nouveau Paris Populaire 11e", data)

    return {
      type: "Feature",
      properties: {
        id_bv: bv.id_bv,
        rank,
      },
      geometry: bv.geo_shape.geometry
    };
  })
};

// Couleur selon vote FI
function getColor(rank) {
  if (rank == null) return "#ccc";

  return rank === 1 ? 'red' :
         rank === 2 ? '#4b0082' :
         rank === 3 ? '#8a2be2' :
         rank === 4 ? '#c77dff' :
         '#f1c0ff';
}

// Style des zones
function style(feature) {
  return {
    fillColor: getColor(feature.properties.rank),
    weight: 1.5,
    color: "#222",
    fillOpacity: 0.8
  };
}


// Popup
function onEachFeature(feature, layer) {

  const p = feature.properties;
  layer.bindPopup(`
    <b>Bureau ${p.id_bv}</b><br>
    Position FI: ${p.rank}<br>
  `);
}

const legend = L.control({ position: "bottomright" });

legend.onAdd = function (map) {
    var div = L.DomUtil.create('div', 'info legend'),
        grades = [1, 2, 3, 4, 5],
        labels = [];

    // loop through our density intervals and generate a label with a colored square for each interval
    for (var i = 0; i < grades.length; i++) {
        div.innerHTML +=
            '<i style="background:' + getColor(grades[i]) + '"></i> ' +
            grades[i] + (grades[i + 1] ? '<br>' : '');
    }

    return div;
};

legend.addTo(map);

// Ajout sur la carte
L.geoJSON(geoData, {
  style: style,
  onEachFeature: onEachFeature
}).addTo(map);
