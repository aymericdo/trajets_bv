function parseCSV(text, delimiter = ';') {
  const rows = [];
  let current = '';
  let row = [];
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    if (inQuotes) {
      if (char === '"') {
        if (text[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = false;
        }
      } else {
        current += char;
      }
    } else {
      if (char === '"') {
        inQuotes = true;
      } else if (char === delimiter) {
        row.push(current);
        current = '';
      } else if (char === '\r') {
        continue;
      } else if (char === '\n') {
        row.push(current);
        rows.push(row);
        row = [];
        current = '';
      } else {
        current += char;
      }
    }
  }
  if (current !== '' || row.length > 0) {
    row.push(current);
    rows.push(row);
  }
  return rows;
}

function parsePointField(value) {
  if (!value) return null;
  try {
    return JSON.parse(value);
  } catch (err) {
    try {
      return JSON.parse(value.replace(/""/g, '"'));
    } catch (err2) {
      return null;
    }
  }
}

function loadHLM() {
  hlmPoints = hlmData.map(item => {
    const point = item.geo_point_2d || item.geo_shape || null;
    const total = parseFloat(String(item['Nombre total de logements financés']).replace(',', '.')) || 0;
    return {
      lon: point?.lon,
      lat: point?.lat,
      total,
      address: item['Adresse du programme'] || '',
      year: item['Année du financement - agrément'] || '',
      type: item['Nature de programme'] || '',
      arrondissement: item['Arrondissement'] || ''
    };
  }).filter(p => p.lon != null && p.lat != null && p.total > 0);

  if (!hlmPoints.length) throw new Error('Aucune donnée HLM valide trouvée');
  return hlmPoints;
}

function computeAxis(points) {
  let meanX = 0;
  let meanY = 0;
  let totalWeight = 0;
  for (const p of points) {
    meanX += p.lon * p.total;
    meanY += p.lat * p.total;
    totalWeight += p.total;
  }
  meanX /= totalWeight;
  meanY /= totalWeight;

  let sxx = 0;
  let syy = 0;
  let sxy = 0;
  for (const p of points) {
    const dx = p.lon - meanX;
    const dy = p.lat - meanY;
    sxx += p.total * dx * dx;
    syy += p.total * dy * dy;
    sxy += p.total * dx * dy;
  }

  if (sxy === 0 && sxx === syy) return { x: 1, y: 0 };
  const theta = 0.5 * Math.atan2(2 * sxy, sxx - syy);
  return { x: Math.cos(theta), y: Math.sin(theta) };
}

function assignZones(points, numZones) {
  const axis = computeAxis(points);
  const sorted = [...points].sort((a, b) => (a.lon * axis.x + a.lat * axis.y) - (b.lon * axis.x + b.lat * axis.y));
  const totalWeight = sorted.reduce((sum, item) => sum + item.total, 0);
  const target = totalWeight / numZones;
  const zones = Array.from({ length: numZones }, () => ({ items: [], weight: 0 }));
  let current = 0;

  for (const item of sorted) {
    if (current < numZones - 1 && zones[current].weight >= target && zones[current].items.length > 0) {
      current += 1;
    }
    zones[current].items.push(item);
    zones[current].weight += item.total;
  }
  return zones;
}

function convexHull(points) {
  if (points.length <= 1) return points;
  const pts = points.slice().sort((a, b) => a[0] === b[0] ? a[1] - b[1] : a[0] - b[0]);
  const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop();
  lower.pop();
  return lower.concat(upper);
}

function drawZones(numZones) {
  pointLayer.clearLayers();
  zoneLayer.clearLayers();
  labelLayer.clearLayers();

  const zones = assignZones(hlmPoints, numZones);
  const summaryLines = [];

  zones.forEach((zone, idx) => {
    const coords = zone.items.map(item => [item.lat, item.lon]);
    if (coords.length >= 3) {
      const hull = convexHull(coords.map(([lat, lon]) => [lon, lat]));
      const hullLatLng = hull.map(([lon, lat]) => [lat, lon]);
      L.polygon(hullLatLng, {
        color: zoneColors[idx],
        fillColor: zoneColors[idx],
        fillOpacity: 0.18,
        weight: 2
      }).addTo(zoneLayer);
    } else if (coords.length === 2) {
      L.polyline(coords, { color: zoneColors[idx], weight: 3 }).addTo(zoneLayer);
    }

    const centroid = {
      lat: zone.items.reduce((sum, item) => sum + item.lat * item.total, 0) / Math.max(zone.weight, 1),
      lon: zone.items.reduce((sum, item) => sum + item.lon * item.total, 0) / Math.max(zone.weight, 1)
    };

    L.circleMarker([centroid.lat, centroid.lon], {
      radius: 8,
      fillColor: zoneColors[idx],
      color: '#333',
      weight: 1,
      fillOpacity: 1
    }).bindPopup(`<strong>Zone ${idx + 1}</strong><br>Logements financés : ${zone.weight.toFixed(0)}`).addTo(labelLayer);

    zone.items.forEach(item => {
      L.circleMarker([item.lat, item.lon], {
        radius: 5,
        fillColor: zoneColors[idx],
        color: '#fff',
        weight: 1,
        fillOpacity: 0.9
      }).bindPopup(`
        <strong>${item.address}</strong><br>
        Arrondissement : ${item.arrondissement}<br>
        Total logements : ${item.total.toFixed(0)}<br>
        Année : ${item.year}<br>
        Nature : ${item.type}<br>
        Zone : ${idx + 1}
      `).addTo(pointLayer);
    });

    summaryLines.push(`
      <div class="legend-item">
        <span class="legend-color" style="background:${zoneColors[idx]};"></span>
        Zone ${idx + 1} : ${zone.weight.toFixed(0)} logts • ${zone.items.length} point(s)
      </div>
    `);
  });

  document.getElementById('summary').innerHTML = '<div style="margin-top:10px;"><strong>Zones créées :</strong></div>' + summaryLines.join('');
  const bounds = pointLayer.getBounds();
  if (bounds.isValid()) map.fitBounds(bounds.pad(0.12));
}

function setMessage(text, isError = false) {
  const elem = document.getElementById('message');
  elem.textContent = text;
  elem.style.color = isError ? '#b00' : '#444';
}

document.getElementById('updateBtn').addEventListener('click', () => {
  const count = parseInt(document.getElementById('zoneCount').value, 10);
  drawZones(count);
});

loadHLM()
setMessage('Données HLM chargées.');
drawZones(parseInt(document.getElementById('zoneCount').value, 10));
</script>
